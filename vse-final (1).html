<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logiciel Pharmacie V.LUCIE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   VARIABLES
════════════════════════════════════════ */
:root {
  --green:#00E5A0; --green-d:rgba(0,229,160,.12); --green-g:rgba(0,229,160,.2);
  --amber:#FFBB4D; --red:#FF6B6B; --sky:#60BFFF; --violet:#C4A0FF;
  --r:10px; --rs:6px;
  --f:'Inter',sans-serif; --fh:'Syne',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#080D14; --bg2:#0F1724; --bg3:#172030; --bg4:#1E2A3E;
  --b:rgba(255,255,255,.06); --b2:rgba(255,255,255,.11);
  --t:#D8E4F0; --t2:#7A8FAA; --t3:#3D5068;
  --sh:0 4px 24px rgba(0,0,0,.5); --shh:0 16px 56px rgba(0,0,0,.7);
  --gl:rgba(10,18,28,.9);
}
[data-theme="light"]{
  --bg:#EDF1F7; --bg2:#FFFFFF; --bg3:#E4EAF4; --bg4:#D6DFF0;
  --b:rgba(0,0,0,.07); --b2:rgba(0,0,0,.12);
  --t:#0F1C2E; --t2:#4A6080; --t3:#94A8C0;
  --sh:0 4px 24px rgba(0,0,0,.08); --shh:0 16px 56px rgba(0,0,0,.14);
  --gl:rgba(255,255,255,.92);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh;transition:background .25s,color .25s;overflow-x:hidden;}

/* ════════════════════════════════════════
   LOCK
════════════════════════════════════════ */
#lock{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:999;
  transition:opacity .5s var(--ease),transform .5s var(--ease);
}
#lock.out{opacity:0;transform:scale(1.05);pointer-events:none;}

.lcard{
  background:var(--bg2);border:1px solid var(--b2);
  border-radius:20px;padding:52px 44px;
  width:min(420px,92vw);text-align:center;
  box-shadow:var(--shh);
  animation:floatin .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes floatin{from{opacity:0;transform:translateY(32px) scale(.94)}to{opacity:1;transform:none}}

.lbadge{
  display:inline-block;font-family:var(--fh);font-size:2.4rem;font-weight:800;
  color:var(--green);letter-spacing:.08em;margin-bottom:6px;
}
.lsub{font-size:.85rem;color:var(--t2);margin-bottom:36px;font-weight:300;letter-spacing:.02em;}

.digits{display:flex;gap:12px;justify-content:center;margin-bottom:10px;}
.dig{
  width:60px;height:68px;
  background:var(--bg3);border:2px solid var(--b2);border-radius:var(--r);
  font-family:var(--fh);font-size:1.8rem;font-weight:700;
  color:var(--t);text-align:center;outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
  caret-color:var(--green);
}
.dig:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-g);background:var(--bg2);}
.dig.ok{border-color:var(--green);color:var(--green);}
.dig.bad{border-color:var(--red);animation:shk .4s ease;background:rgba(255,107,107,.07);}
@keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.lerr{min-height:20px;color:var(--red);font-size:.8rem;margin-top:4px;}
.lhint{font-size:.72rem;color:var(--t3);margin-top:16px;font-family:monospace;letter-spacing:.06em;}

/* ════════════════════════════════════════
   APP
════════════════════════════════════════ */
#app{display:none;opacity:0;transition:opacity .4s;}
#app.vis{display:block;}
#app.vis{opacity:1;}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
header{
  position:sticky;top:0;z-index:100;
  background:var(--gl);backdrop-filter:blur(18px) saturate(1.6);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);
  border-bottom:1px solid var(--b);
  height:62px;padding:0 22px;
  display:flex;align-items:center;gap:16px;
}
.hbrand{display:flex;align-items:center;gap:10px;}
.hbadge{
  font-family:var(--fh);font-weight:800;font-size:.75rem;
  letter-spacing:.12em;color:#080D14;
  background:var(--green);padding:4px 11px;border-radius:100px;
}
.hname{font-family:var(--fh);font-size:1rem;font-weight:600;color:var(--t);letter-spacing:.02em;}
.hsp{flex:1;}

.sync-wrap{display:flex;align-items:center;gap:10px;}
.sync-status{font-size:.72rem;color:var(--t3);font-family:monospace;}
.sync-status.live{color:var(--green);}
.sync-status.err{color:var(--red);}

.sync-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);
  color:var(--t2);font-family:var(--f);font-size:.78rem;font-weight:500;
  padding:7px 13px;cursor:pointer;transition:all .2s;
}
.sync-btn:hover{background:var(--bg4);color:var(--green);border-color:var(--green);}
.sync-btn svg{transition:transform .3s;}
.sync-btn.spinning svg{animation:spin 1s linear infinite;}
.sync-btn.done{color:var(--green);border-color:var(--green);background:var(--green-d);}
@keyframes spin{to{transform:rotate(360deg)}}

.theme-btn{
  width:36px;height:36px;background:var(--bg3);border:1px solid var(--b2);
  border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:var(--t2);transition:all .2s;
}
.theme-btn:hover{background:var(--bg4);color:var(--t);}

/* ════════════════════════════════════════
   TABS
════════════════════════════════════════ */
.tabbar{
  background:var(--bg2);border-bottom:1px solid var(--b);
  padding:0 22px;display:flex;align-items:flex-end;gap:2px;
}
.tab{
  padding:14px 20px 12px;background:none;border:none;
  border-bottom:2.5px solid transparent;cursor:pointer;
  font-family:var(--f);font-size:.85rem;font-weight:500;
  color:var(--t3);display:flex;align-items:center;gap:8px;
  transition:all .2s;white-space:nowrap;
}
.tab:hover{color:var(--t2);background:rgba(255,255,255,.03);border-radius:8px 8px 0 0;}
.tab.on{color:var(--green);border-bottom-color:var(--green);}
.tab-n{
  font-family:monospace;font-size:.63rem;font-weight:600;
  padding:1px 7px;border-radius:100px;
  background:var(--bg3);color:var(--t3);transition:all .2s;
}
.tab.on .tab-n{background:var(--green-d);color:var(--green);}

/* ════════════════════════════════════════
   SEARCH
════════════════════════════════════════ */
.search-bar{
  padding:16px 22px 14px;background:var(--bg2);
  border-bottom:1px solid var(--b);
}
.search-inner{position:relative;max-width:580px;}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;}
.search-inp{
  width:100%;height:44px;padding:0 44px;
  background:var(--bg3);border:1.5px solid var(--b2);border-radius:var(--r);
  font-family:var(--f);font-size:.9rem;color:var(--t);outline:none;
  transition:all .2s;
}
.search-inp:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-g);background:var(--bg2);}
.search-inp::placeholder{color:var(--t3);}
.search-x{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:var(--bg4);border:none;border-radius:50%;width:22px;height:22px;
  cursor:pointer;color:var(--t3);display:none;align-items:center;justify-content:center;
  font-size:13px;line-height:1;transition:all .2s;
}
.search-x:hover{color:var(--t);}
.search-x.vis{display:flex;}
.search-meta{margin-top:8px;font-size:.73rem;color:var(--t3);font-family:monospace;}
.search-meta b{color:var(--green);}

/* ════════════════════════════════════════
   PANELS
════════════════════════════════════════ */
.panel{display:none;}
.panel.on{display:block;}
.tw{overflow-x:auto;padding:20px 22px 60px;}

/* ════════════════════════════════════════
   SKELETON / LOADING
════════════════════════════════════════ */
.skel{padding:40px 22px;}
.skel-row{height:44px;background:var(--bg3);border-radius:var(--rs);margin-bottom:6px;
  animation:pulse 1.4s ease infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
.loading-msg{text-align:center;padding:60px 20px;color:var(--t3);}
.dots{display:inline-flex;gap:5px;margin-bottom:12px;}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--green);
  animation:db 1.1s ease infinite;}
.dots span:nth-child(2){animation-delay:.18s;}
.dots span:nth-child(3){animation-delay:.36s;}
@keyframes db{0%,80%,100%{transform:scale(.4);opacity:.3}40%{transform:scale(1);opacity:1}}

/* ════════════════════════════════════════
   TABLE — FEUILLE 1
════════════════════════════════════════ */
.dtable{width:100%;border-collapse:separate;border-spacing:0;font-size:.83rem;}
.dtable thead{position:sticky;top:124px;z-index:10;}
.dtable th{
  background:var(--bg3);color:var(--t2);
  font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;
  padding:10px 14px;text-align:left;white-space:nowrap;font-family:monospace;
  border-top:1px solid var(--b);border-bottom:1px solid var(--b2);
}
.dtable th:first-child{border-left:1px solid var(--b);border-radius:var(--rs) 0 0 0;}
.dtable th:last-child{border-right:1px solid var(--b);border-radius:0 var(--rs) 0 0;}
.dtable tbody tr{background:var(--bg2);transition:background .15s;animation:rowi .22s ease both;}
@keyframes rowi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.dtable tbody tr:hover{background:var(--bg3);}
.dtable td{padding:11px 14px;border-bottom:1px solid var(--b);vertical-align:top;line-height:1.55;}
.dtable td:first-child{border-left:1px solid var(--b);}
.dtable td:last-child{border-right:1px solid var(--b);}
.dtable tbody tr:last-child td:first-child{border-radius:0 0 0 var(--rs);}
.dtable tbody tr:last-child td:last-child{border-radius:0 0 var(--rs) 0;}

/* cellules */
.cnom{font-weight:600;color:var(--t);white-space:nowrap;}
.cnom small{display:block;color:var(--t3);font-size:.7rem;font-weight:400;font-family:monospace;margin-top:2px;}
.cdci{font-size:.8rem;color:var(--t2);}
.cdci em{display:block;color:var(--green);font-style:normal;font-size:.7rem;font-family:monospace;margin-top:3px;}
.cspec{font-size:.76rem;color:var(--t3);max-width:145px;}
.cindic{font-size:.8rem;color:var(--t);max-width:200px;}
.cei{font-size:.76rem;color:var(--amber);max-width:185px;}
.ccode{max-width:190px;}
.ccons{font-size:.76rem;}

/* tags */
.tag{display:inline-block;font-family:monospace;font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:4px;margin:2px 2px 2px 0;letter-spacing:.04em;white-space:nowrap;}
.tpih{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.22);}
.tpi{background:rgba(96,191,255,.1);color:var(--sky);border:1px solid rgba(96,191,255,.22);}
.tr{background:rgba(255,187,77,.1);color:var(--amber);border:1px solid rgba(255,187,77,.22);}
.tbio{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.22);}
.tsur{background:rgba(196,160,255,.1);color:var(--violet);border:1px solid rgba(196,160,255,.22);}
.tdel{background:rgba(255,107,107,.14);color:var(--red);border:1px solid rgba(255,107,107,.28);}
.tgen{background:var(--bg4);color:var(--t2);border:1px solid var(--b2);}
.tfridge{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;color:var(--sky);background:rgba(96,191,255,.08);border:1px solid rgba(96,191,255,.18);border-radius:4px;padding:2px 8px;}

mark{background:rgba(0,229,160,.25);color:var(--green);border-radius:2px;padding:0 1px;}

/* ════════════════════════════════════════
   BIOSIMILAIRES — FEUILLE 2
════════════════════════════════════════ */
.bio-block{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);margin-bottom:20px;overflow:hidden;}
.bio-head{background:var(--bg3);padding:14px 18px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.bio-mol{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--green);}
.bio-cls{font-size:.76rem;color:var(--t2);margin-top:3px;}
.bio-ordo{font-size:.7rem;color:var(--violet);font-family:monospace;margin-top:3px;}
.bio-stabilis{font-size:.68rem;color:var(--sky);font-family:monospace;}
.bio-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1px;background:var(--b);}
.bio-card{background:var(--bg2);padding:13px 15px;transition:background .15s;}
.bio-card:hover{background:var(--bg3);}
.bio-card.ref{background:rgba(0,229,160,.04);}
.bio-badge{font-family:monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.bio-badge.ref-b{color:var(--green);}
.bio-badge.sim-b{color:var(--t3);}
.bio-name{font-weight:600;font-size:.88rem;color:var(--t);}
.bio-doses{font-size:.7rem;color:var(--t3);margin-top:4px;line-height:1.55;}
.bio-conserv{margin-top:6px;font-size:.67rem;color:var(--sky);}
.bio-note-s{font-size:.65rem;color:var(--amber);margin-top:4px;font-style:italic;}
.bio-indic{padding:12px 18px;font-size:.78rem;color:var(--t2);border-top:1px solid var(--b);line-height:1.65;background:var(--bg3);}
.bio-note-b{padding:9px 18px;font-size:.72rem;color:var(--amber);border-top:1px solid var(--b);font-style:italic;}

/* ════════════════════════════════════════
   VACCINS — FEUILLE 3
════════════════════════════════════════ */
.vacc-card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);margin-bottom:14px;overflow:hidden;}
.vacc-head{background:var(--bg3);padding:13px 18px;border-bottom:1px solid var(--b);}
.vacc-title{font-family:var(--fh);font-size:.95rem;font-weight:600;color:var(--t);}
.vacc-body{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.vacc-col{padding:14px 18px;}
.vacc-col+.vacc-col{border-left:1px solid var(--b);}
.vacc-label{font-family:monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;margin-bottom:7px;}
.vacc-vaccins{font-size:.79rem;color:var(--sky);line-height:1.65;}
.vacc-schema{font-size:.78rem;color:var(--t2);line-height:1.65;}
.vacc-autre{font-size:.75rem;color:var(--amber);line-height:1.6;margin-top:12px;}
@media(max-width:640px){.vacc-body{grid-template-columns:1fr;}.vacc-col+.vacc-col{border-left:none;border-top:1px solid var(--b);}}

/* ════════════════════════════════════════
   EMPTY
════════════════════════════════════════ */
.empty{text-align:center;padding:80px 20px;color:var(--t3);}
.empty svg{opacity:.3;margin-bottom:14px;}
.empty p{font-size:.9rem;color:var(--t2);}
.empty small{font-size:.78rem;}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
.toast{
  position:fixed;bottom:22px;right:22px;z-index:500;
  background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);
  padding:12px 18px;font-size:.84rem;color:var(--t);
  box-shadow:var(--shh);display:flex;align-items:center;gap:10px;max-width:320px;
  transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.tok{border-color:var(--green);}
.toast.terr{border-color:var(--red);}

@media(max-width:700px){
  header{padding:0 14px;gap:10px;}
  .hname{display:none;}
  .sync-status{display:none;}
  .search-bar{padding:12px 14px 10px;}
  .tw{padding:14px 0 60px;}
  .tabbar{padding:0 14px;}
}

/* ══ ONCOLOGIE ══════════════════════ */
.onco-page { margin-bottom:32px; }
.onco-page-title { font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--font-mono);color:var(--t3);padding:6px 0 10px;border-bottom:1px solid var(--b);margin-bottom:16px;display:flex;align-items:center;gap:8px; }
.onco-page-title span { background:var(--bg3);border:1px solid var(--b2);border-radius:4px;padding:2px 8px;font-size:.65rem; }
.onco-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px; }
.onco-card { background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;animation:row-in .22s ease both; }
.onco-card-head { padding:10px 14px 8px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px; }
.onco-ef-name { font-size:.85rem;font-weight:700;color:var(--t);flex:1; }
.onco-card-body { padding:12px 14px; }
.onco-section { margin-bottom:10px; }
.onco-section:last-child { margin-bottom:0; }
.onco-section-lbl { font-family:var(--font-mono);font-size:.59rem;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;margin-bottom:5px; }
.onco-drugs { font-size:.77rem;color:var(--sky);line-height:1.6; }
.onco-text { font-size:.77rem;color:var(--t2);line-height:1.65; }
.onco-prevention { font-size:.77rem;color:var(--green);line-height:1.65; }
.onco-treatment { font-size:.77rem;color:var(--amber);line-height:1.65; }
.onco-note { font-size:.74rem;color:var(--violet);line-height:1.6;background:rgba(169,139,223,.07);border-radius:4px;padding:5px 8px;margin-top:6px;border-left:2px solid var(--violet); }
.onco-icon { width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0; }
</style>
</head>
<body>

<!-- ═══════════ APP ═══════════ -->
<div id="app" class="vis" style="display:block">

  <header>
    <div class="hbrand">

/* ════════════════════════════════════════════════════════════
   CONFIG — URL de ton Apps Script
════════════════════════════════════════════════════════════ */
const API = 'https://script.google.com/macros/s/AKfycbwcwBp1CrMuu8OWDgtRViDQzu60QPLE3S01zy_FVEmlkmhfSLN9Mu0Xwc3F7kwg9vzl/exec';

// Noms EXACTS des feuilles dans ton Google Sheet
const SHEETS = [
  "Médicaments d'Exception",  // onglet 0
  "medicament",                // onglet 1
  "Vaccin"                     // onglet 2
];

/* ════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════ */
let data    = [[], [], []];   // données brutes par onglet
let tab     = 0;
let q       = '';
let synced  = false;

/* ════════════════════════════════════════════════════════════
   LOCK — code 873  inp.addEventListener('input', () => {
    inp.value = (inp.value || '').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,1);
    if (inp.value) {
      inp.classList.add('ok');
      if (i < 2) DIGS[i+1].focus();    } else { inp.classList.remove('ok'); }
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) DIGS[i-1].focus();  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,3);
    txt.split('').forEach((c, j) => { if (DIGS[j]) { DIGS[j].value = c; DIGS[j].classList.add('ok'); }});    else if (DIGS[txt.length]) DIGS[txt.length].focus();
  });
});
DIGS[0].focus();
  const entered = DIGS.map(d => d.value).join('');
  if (entered === CODE) {
    document.getElementById('lock').classList.add('out');
    setTimeout(() => {
      document.getElementById('lock').style.display = 'none';
      const app = document.getElementById('app');
      app.style.display = 'block';
      requestAnimationFrame(() => {
        app.classList.add('vis');
        syncAll(); // Charge les données dès l'ouverture
      });
    }, 500);
  } else {    document.getElementById('lerr').textContent = 'Code incorrect';
    setTimeout(() => {      document.getElementById('lerr').textContent = '';
      DIGS[0].focus();
    }, 900);
  }
}

/* ════════════════════════════════════════════════════════════
   THEME
════════════════════════════════════════════════════════════ */
const savedTheme = localStorage.getItem('vse-theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
updateThemeIcon(savedTheme);

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const nxt = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', nxt);
  localStorage.setItem('vse-theme', nxt);
  updateThemeIcon(nxt);
}
function updateThemeIcon(t) {
  const ico = document.getElementById('theme-ico');
  if (!ico) return;
  ico.innerHTML = t === 'dark'
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}

/* ════════════════════════════════════════════════════════════
   SYNC — appel Apps Script
════════════════════════════════════════════════════════════ */
async function syncAll() {
  const btn = document.getElementById('sync-btn');
  const status = document.getElementById('sync-status');

  btn.classList.add('spinning'); btn.classList.remove('done');
  status.textContent = 'Chargement…'; status.className = 'sync-status';

  try {
    // Charge les 3 feuilles en parallèle
    const results = await Promise.all(
      SHEETS.map((sheet, i) =>
        fetchSheet(sheet).then(rows => ({ i, rows }))
      )
    );

    results.forEach(({ i, rows }) => {
      data[i] = rows;
      document.getElementById('cnt' + i).textContent = rows.length;
    });

    // Render
    renderCurrent();
    renderOthers();

    const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    btn.classList.remove('spinning'); btn.classList.add('done');
    status.textContent = `Sync ${now}`; status.className = 'sync-status live';
    synced = true;
    toast('tok', `✓ ${data[0].length + data[1].length + data[2].length} entrées synchronisées`);

  } catch (err) {
    btn.classList.remove('spinning');
    status.textContent = 'Erreur sync'; status.className = 'sync-status err';
    console.error(err);
    toast('terr', `⚠ ${err.message}`);
  }
}

async function fetchSheet(sheetName) {
  // Paramètre ?sheet= pour appeler la bonne feuille
  const url = `${API}?sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Erreur HTTP ${res.status} pour "${sheetName}"`);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json; // tableau d'objets [{header: valeur, ...}, ...]
}

/* ════════════════════════════════════════════════════════════
   TABS & SEARCH
════════════════════════════════════════════════════════════ */
function switchTab(i) {
  tab = i;
  document.querySelectorAll('.tab').forEach((b, j) => b.classList.toggle('on', i === j));
  document.querySelectorAll('.panel').forEach((p, j) => p.classList.toggle('on', i === j));
  if (i === 3) renderTab3();
  renderCurrent();
}

function onSearch() {
  q = document.getElementById('search-inp').value.trim().toLowerCase();
  document.getElementById('search-x').classList.toggle('vis', q.length > 0);
  renderCurrent();
}

function clearSearch() {
  document.getElementById('search-inp').value = '';
  q = '';
  document.getElementById('search-x').classList.remove('vis');
  renderCurrent();
}

function renderOthers() {
  // Render silencieusement les autres panels pour les avoir prêts
  const cur = tab;
  [0, 1, 2].forEach(i => { if (i !== cur) renderTab(i); });
}

function renderCurrent() {
  renderTab(tab);
}

function renderTab(i) {
  if (!data[i] || !data[i].length) return;
  if (i === 0) renderSheet1();
  else if (i === 1) renderSheet2();
  else renderSheet3();
}

/* ════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function hl(s) {
  if (!q || !s) return esc(s || '');
  const e = esc(String(s));
  const re = new RegExp('(' + esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return e.replace(re, '<mark>$1</mark>');
}
function nl(s) {
  return String(s || '').replace(/\n/g, '<br>');
}
function hlnl(s) { return nl(hl(s)); }

function makeTags(val) {
  if (!val) return '<span style="color:var(--t3)">—</span>';
  const parts = String(val).split(/[|\n]+/).map(p => p.trim()).filter(Boolean);
  const first = []; const rest = [];
  parts.forEach(p => {
    const u = p.toUpperCase();
    let tag = '';
    if (u.includes('PIH'))        tag = `<span class="tag tpih">${esc(p)}</span>`;
    else if (/^PI\s/.test(u)||u==='PI SPE') tag = `<span class="tag tpi">${esc(p)}</span>`;
    else if (/^R\s/.test(u))      tag = `<span class="tag tr">${esc(p)}</span>`;
    else if (u.includes('BIO SIM')) tag = `<span class="tag tbio">BIO SIM</span>`;
    else if (u === 'BIO')         tag = `<span class="tag tbio">BIO</span>`;
    else if (u.includes('SUR'))   tag = `<span class="tag tsur">${esc(p)}</span>`;
    else if (u.includes('SUPPRIMÉ')||u.includes('ARRÊT')) tag = `<span class="tag tdel">${esc(p)}</span>`;
    else                          tag = `<span class="tag tgen">${esc(p)}</span>`;

    if (['PIH','PI SPE','R SPE','BIO SIM','BIO','SUR'].some(k => u.startsWith(k) || u === k)) first.push(tag);
    else rest.push(tag);
  });
  return [...first, ...rest].join(' ');
}

function makeFridge(val) {
  if (!val) return '<span style="color:var(--t3)">—</span>';
  const s = String(val);
  const has = s.includes('🧊') || /réfrig/i.test(s);
  let out = '';
  if (has) out = `<span class="tfridge">🧊 Réfrigérateur</span>`;
  const note = s.replace(/🧊/g,'').replace(/réfrigérateur/gi,'').trim();
  if (note) out += `<br><span style="font-size:.68rem;color:var(--t3)">${hl(note)}</span>`;
  return out || hl(s);
}

function val(row, ...keys) {
  for (const k of keys) {
    if (row[k] !== undefined && row[k] !== '' && row[k] !== 'undefined') return String(row[k]);
  }
  return '';
}

function matches(row) {
  if (!q) return true;
  return Object.values(row).some(v => v && String(v).toLowerCase().includes(q));
}

function setMeta(n, total) {
  const el = document.getElementById('search-meta');
  if (q) el.innerHTML = `<b>${n}</b> résultat${n>1?'s':''} pour «&nbsp;${esc(q)}&nbsp;»`;
  else el.innerHTML = `<b>${total}</b> enregistrement${total>1?'s':''}`;
}

/* ════════════════════════════════════════════════════════════
   RENDER FEUILLE 1 — Médicaments d'Exception
   Colonnes: NOM COMMERCIAL | DCI — CLASSE | SPÉCIALITÉS PRESCRIPTEURS
             INDICATIONS | EFFETS INDÉSIRABLES | MODALITÉS / CODES | CONSERVATION
════════════════════════════════════════════════════════════ */
function renderSheet1() {
  const rows = data[0].filter(matches);
  if (tab === 0) setMeta(rows.length, data[0].length);
  const tw = document.getElementById('tw0');

  if (!rows.length) {
    tw.innerHTML = emptyHTML(); return;
  }

  // En-têtes depuis les clés du 1er objet
  const headers = data[0].length ? Object.keys(data[0][0]) : [];

  let h = `<table class="dtable"><thead><tr>`;
  headers.forEach(hd => h += `<th>${esc(hd)}</th>`);
  h += `</tr></thead><tbody>`;

  rows.forEach((row, ri) => {
    h += `<tr style="animation-delay:${Math.min(ri*.016,.3)}s">`;

    headers.forEach((hd, ci) => {
      const v = val(row, hd);
      const hlow = hd.toLowerCase();

      if (ci === 0) {
        // NOM COMMERCIAL — sépare forme galénique
        const m = v.match(/^(.+?)(\s*[\(\[].+[\)\]])\s*$/);
        h += `<td class="cnom">${m ? hl(m[1]) + `<small>${hl(m[2])}</small>` : hl(v)}</td>`;

      } else if (hlow.includes('dci')) {
        // DCI — sépare classe sur newline ou parenthèse
        const lines = v.split('\n');
        const dci = lines[0] || '';
        const cls = lines.slice(1).join(' ').replace(/[()]/g,'').trim();
        h += `<td class="cdci">${hl(dci)}${cls ? `<em>${hl(cls)}</em>` : ''}</td>`;

      } else if (hlow.includes('spéc') || hlow.includes('prescr')) {
        h += `<td class="cspec">${hlnl(v) || '<span style="color:var(--t3)">—</span>'}</td>`;

      } else if (hlow.includes('indic')) {
        h += `<td class="cindic">${hlnl(v)}</td>`;

      } else if (hlow.includes('effet') || hlow.includes('indés')) {
        h += `<td class="cei">${hlnl(v)}</td>`;

      } else if (hlow.includes('modal') || hlow.includes('code')) {
        // Tags + note en dessous
        const lines = v.split('\n');
        const tagLine = lines[0] || '';
        const noteLine = lines.slice(1).join('\n');
        h += `<td class="ccode">${makeTags(tagLine)}${noteLine ? `<br><span style="font-size:.7rem;color:var(--t3)">${hlnl(noteLine)}</span>` : ''}</td>`;

      } else if (hlow.includes('conserv')) {
        h += `<td class="ccons">${makeFridge(v)}</td>`;

      } else {
        h += `<td>${hlnl(v)}</td>`;
      }
    });

    h += `</tr>`;
  });

  h += `</tbody></table>`;
  tw.innerHTML = h;
}

/* ════════════════════════════════════════════════════════════
   RENDER FEUILLE 2 — Médicaments (Biosimilaires)
   Structure complexe : molécule / référence / biosimilaires / conservation
════════════════════════════════════════════════════════════ */
function renderSheet2() {
  const rows = data[1];
  const tw = document.getElementById('tw1');

  if (!rows || !rows.length) {
    tw.innerHTML = `<div class="loading-msg"><div class="dots"><span></span><span></span><span></span></div><br>Chargement…</div>`;
    return;
  }

  // La feuille "medicament" a une structure complexe horizontale
  // On regroupe les lignes par blocs : chaque molécule est identifiée
  // par la présence d'un nom en colonne A ou d'un marqueur "Médicament biologique de référence"
  // On affiche les données brutes sous forme de cards lisibles

  // Filtrer sur recherche
  const filtered = !q ? rows : rows.filter(matches);
  if (tab === 1) setMeta(filtered.length, rows.length);

  if (!filtered.length) { tw.innerHTML = emptyHTML(); return; }

  // Affichage intelligent : on détecte les blocs molécule
  // La structure est : ligne 1 = headers "Médicament biologique | Biosimilaires"
  // Ligne suivante = noms des spécialités
  // Ligne suivante = classe / ordo + dosages
  // etc.
  // → On affiche chaque ligne comme une "fiche" lisible

  // Grouper par molécule (colonne 0 non vide = nouvelle molécule)
  const headers = Object.keys(rows[0]);
  const blocs = [];
  let curBloc = null;

  rows.forEach(row => {
    const col0 = val(row, headers[0]);
    const col2 = val(row, headers[2]);

    if (col0 && col0 !== '' && !/conservation/i.test(col0) && !/galénique/i.test(col0) && col0 !== 'Injection intravitréenne') {
      // Nouvelle molécule
      curBloc = { mol: col0, rows: [row] };
      blocs.push(curBloc);
    } else if (curBloc) {
      curBloc.rows.push(row);
    }
  });

  let h = '';
  blocs.forEach(bloc => {
    if (!bloc.rows.length) return;

    // Chercher la ligne avec les noms des spécialités (3e colonne = ref, 4e = biosim)
    const nameRow = bloc.rows.find(r => {
      const v2 = val(r, headers[2]);
      return v2 && /[A-Z]{3,}/.test(v2) && !/dosage/i.test(v2) && !/conservation/i.test(v2);
    });

    // Chercher la ligne avec les dosages
    const doseRow = bloc.rows.find(r => {
      return val(r, headers[2]) && /dosage/i.test(val(r, headers[2]));
    });

    // Chercher la ligne conservation
    const conservRow = bloc.rows.find(r => {
      const v1 = val(r, headers[1]);
      return /conservation/i.test(v1);
    });

    // Chercher indications (dernière colonne non vide des headers > 11)
    const indicRow = bloc.rows.find(r => {
      const lastKey = headers[headers.length - 2];
      return val(r, lastKey) && val(r, lastKey).length > 20;
    });

    const classe = bloc.rows[0] ? val(bloc.rows[0], headers[0]) : '';
    const ordo = bloc.rows[0] ? val(bloc.rows[0], headers[1]) : '';

    // Construire la liste des spécialités depuis nameRow
    const specs = [];
    if (nameRow) {
      headers.slice(2).forEach(k => {
        const v = val(nameRow, k);
        if (v && v.length < 50 && /[A-Z]/.test(v) && v !== 'INDICATIONS' && v !== 'Galénique' && !/^\d/.test(v)) {
          const isRef = specs.length === 0;
          const doses = doseRow ? val(doseRow, k) : '';
          const conserv = conservRow ? val(conservRow, k) : '';
          specs.push({ nom: v, doses, conserv, isRef });
        }
      });
    }

    const indic = indicRow ? val(indicRow, headers[headers.length - 2]) : '';
    const note = bloc.rows.find(r => /galénique|différencie|seringue/i.test(Object.values(r).join(' ')));

    h += `<div class="bio-block">
      <div class="bio-head">
        <div>
          <div class="bio-mol">${hl(bloc.mol)}</div>
          ${classe && classe !== bloc.mol ? `<div class="bio-cls">${hl(classe)}</div>` : ''}
          ${ordo ? `<div class="bio-ordo">${hl(ordo)}</div>` : ''}
        </div>
      </div>`;

    if (specs.length) {
      h += `<div class="bio-cards">`;
      specs.forEach(sp => {
        h += `<div class="bio-card${sp.isRef ? ' ref' : ''}">
          <div class="bio-badge ${sp.isRef ? 'ref-b' : 'sim-b'}">${sp.isRef ? '★ Référence' : '◎ Biosimilaire'}</div>
          <div class="bio-name">${hl(sp.nom)}</div>
          ${sp.doses ? `<div class="bio-doses">${hlnl(sp.doses)}</div>` : ''}
          ${sp.conserv ? `<div class="bio-conserv">${hl(sp.conserv)}</div>` : ''}
        </div>`;
      });
      h += `</div>`;
    }

    if (indic) h += `<div class="bio-indic"><strong style="color:var(--t3);font-size:.65rem;font-family:monospace;text-transform:uppercase;letter-spacing:.07em">Indications</strong><br>${hlnl(indic)}</div>`;
    if (note) {
      const noteText = Object.values(note).filter(v => v && String(v).length > 15).join(' — ');
      if (noteText) h += `<div class="bio-note-b">ℹ ${esc(noteText)}</div>`;
    }

    h += `</div>`;
  });

  tw.innerHTML = h || `<div class="loading-msg">Données chargées. Utilisez la recherche.</div>`;
}

function renderSheet3() {
  const rows = data[2];

  if (!rows || !rows.length) {
    tw.innerHTML = `<div class="loading-msg"><div class="dots"><span></span><span></span><span></span></div><br>Chargement…</div>`;
    return;
  }

  const filtered = !q ? rows : rows.filter(matches);
  if (tab === 2) setMeta(filtered.length, rows.length);

  if (!filtered.length) { tw.innerHTML = emptyHTML(); return; }

  // Récupérer les clés depuis le 1er objet
  const keys = Object.keys(rows[0]);
  const kIndic   = keys[0]; // Indication
  const kVaccins = keys[1]; // Vaccins
  const kSchema  = keys[2]; // Schéma vaccinaux
  const kAutre   = keys[3]; // Autre
  const kReconst = keys[4]; // Reconstitution

  let h = '';
  filtered.forEach((row, ri) => {
    const indic   = val(row, kIndic);
    const vaccins = val(row, kVaccins);
    const schema  = val(row, kSchema);
    const autre   = val(row, kAutre);
    const reconst = val(row, kReconst);

    if (!indic) return;

    h += `<div class="vacc-card" style="animation-delay:${Math.min(ri*.05,.5)}s;animation:rowi .25s ease both;">
      <div class="vacc-head">
        <div class="vacc-title">${hl(indic)}</div>
        ${reconst && reconst !== 'non' ? `<div style="font-size:.72rem;color:var(--violet);margin-top:4px;font-family:monospace">Reconstitution : ${hl(reconst)}</div>` : ''}
      </div>
      <div class="vacc-body">
        <div class="vacc-col">
          <div class="vacc-label">💊 Vaccins disponibles</div>
          <div class="vacc-vaccins">${hlnl(vaccins)}</div>
        </div>
        <div class="vacc-col">
          <div class="vacc-label">📅 Schémas vaccinaux</div>
          <div class="vacc-schema">${hlnl(schema)}</div>
          ${autre ? `<div class="vacc-autre">${hlnl(autre)}</div>` : ''}
        </div>
      </div>
    </div>`;
  });

  tw.innerHTML = h || emptyHTML();
}

function renderTab3() {
  const tw = document.getElementById('tw3');
  const qr = q.toLowerCase();

  let html = '';
  let totalResults = 0;

  ONCO_DATA.forEach(page => {
    const effects = !qr ? page.effects : page.effects.filter(ef =>
      [ef.nom, ef.drugs, ef.generalites, ef.prevention, ef.traitement, ef.note||'']
        .some(s => s && s.toLowerCase().includes(qr))
    );
    if (!effects.length) return;
    totalResults += effects.length;

    html += `<div class="onco-page">
      <div class="onco-page-title">
        ${esc(page.page)}
        <span>${effects.length} effet${effects.length > 1 ? 's' : ''}</span>
      </div>
      <div class="onco-grid">`;

    effects.forEach((ef, ri) => {
      html += `<div class="onco-card" style="animation-delay:${Math.min(ri*.04,.4)}s;border-top:3px solid ${ef.couleur}">
        <div class="onco-card-head">
          <div class="onco-icon" style="background:${ef.couleur}22;border:1px solid ${ef.couleur}44;color:${ef.couleur}">${ef.icon}</div>
          <div class="onco-ef-name">${hl(ef.nom)}</div>
        </div>
        <div class="onco-card-body">`;

      if (ef.drugs) html += `
          <div class="onco-section">
            <div class="onco-section-lbl">💊 Anti-cancéreux impliqués</div>
            <div class="onco-drugs">${hlnl(ef.drugs)}</div>
          </div>`;

      if (ef.generalites) html += `
          <div class="onco-section">
            <div class="onco-section-lbl">📋 Généralités / Contrôle</div>
            <div class="onco-text">${hlnl(ef.generalites)}</div>
          </div>`;

      if (ef.prevention) html += `
          <div class="onco-section">
            <div class="onco-section-lbl">🛡 Prévention</div>
            <div class="onco-prevention">${hlnl(ef.prevention)}</div>
          </div>`;

      if (ef.traitement) html += `
          <div class="onco-section">
            <div class="onco-section-lbl">💉 Traitement</div>
            <div class="onco-treatment">${hlnl(ef.traitement)}</div>
          </div>`;

      if (ef.note) html += `<div class="onco-note">ℹ ${hlnl(ef.note)}</div>`;

      html += `</div></div>`;
    });

    html += `</div></div>`;
  });

  if (!html) {
    html = `<div class="onco-search-none">
      <p style="font-size:.9rem;color:var(--t2)">Aucun résultat pour «&nbsp;${esc(q)}&nbsp;»</p>
    </div>`;
  }

  tw.innerHTML = html;

  // Mettre à jour le compteur
  if (tab === 3) {
    const el = document.getElementById('s-meta');
    if (q) el.innerHTML = `<b>${totalResults}</b> résultat${totalResults>1?'s':''} pour «&nbsp;${esc(q)}&nbsp;»`;
    else   el.innerHTML = `<b>18</b> effets indésirables — 3 pages`;
  }
}
